<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISMO-SkillSwap — Support</title>
  <meta name="description" content="Contactez le support ISMO-SkillSwap." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
  <link rel="stylesheet" href="../assets/css/legal.css" />
  <style>
    .support-layout {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .support-tabs {
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--gray-200);
      padding-bottom: 0;
      margin-bottom: 0;
    }

    .support-tab {
      padding: 10px 20px;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      font-weight: 600;
      font-size: .9rem;
      color: var(--gray-500);
      cursor: pointer;
      transition: all var(--transition);
    }

    .support-tab:hover {
      color: var(--gray-700);
      background: var(--gray-50);
    }

    .support-tab.active {
      color: var(--blue-600);
      background: var(--white);
      border-color: var(--gray-200);
      margin-bottom: -1px;
    }

    .support-panel {
      display: none;
    }

    .support-panel.active {
      display: block;
    }

    .ticket-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .ticket-form .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ticket-form label {
      font-weight: 600;
      font-size: .85rem;
      color: var(--gray-700);
    }

    .ticket-form input,
    .ticket-form select,
    .ticket-form textarea {
      padding: 10px 14px;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      font-family: inherit;
      font-size: .9rem;
      color: var(--gray-900);
      transition: border-color var(--transition);
    }

    .ticket-form input:focus,
    .ticket-form select:focus,
    .ticket-form textarea:focus {
      outline: none;
      border-color: var(--blue-600);
    }

    .ticket-form textarea {
      min-height: 120px;
      resize: vertical;
    }

    .ticket-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ticket-card {
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .ticket-card:hover {
      border-color: var(--blue-200);
      box-shadow: var(--shadow-sm);
    }

    .ticket-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .ticket-card-subject {
      font-weight: 600;
      font-size: .95rem;
      color: var(--gray-900);
    }

    .ticket-card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .ticket-status {
      font-size: .75rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    .ticket-status.open {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .ticket-status.in_progress {
      background: #fef3c7;
      color: #b45309;
    }

    .ticket-status.waiting {
      background: #f3e8ff;
      color: #7c3aed;
    }

    .ticket-status.resolved {
      background: #d1fae5;
      color: #047857;
    }

    .ticket-status.closed {
      background: var(--gray-100);
      color: var(--gray-500);
    }

    .ticket-category {
      font-size: .8rem;
      color: var(--gray-500);
      background: var(--gray-100);
      padding: 2px 10px;
      border-radius: 999px;
    }

    .ticket-date {
      font-size: .8rem;
      color: var(--gray-400);
    }

    .ticket-card-expand {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--gray-100);
      display: none;
    }

    .ticket-card.expanded .ticket-card-expand {
      display: block;
    }

    .ticket-description {
      font-size: .88rem;
      color: var(--gray-600);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .ticket-reply {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--gray-50);
    }

    .ticket-reply:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .ticket-reply-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--gray-200);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .75rem;
      font-weight: 700;
      color: var(--gray-600);
    }

    .ticket-reply.staff .ticket-reply-avatar {
      background: var(--blue-100);
      color: var(--blue-600);
    }

    .ticket-reply-body {
      flex: 1;
      min-width: 0;
    }

    .ticket-reply-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .ticket-reply-author {
      font-weight: 600;
      font-size: .82rem;
      color: var(--gray-800);
    }

    .ticket-reply-time {
      font-size: .75rem;
      color: var(--gray-400);
    }

    .ticket-reply-text {
      font-size: .85rem;
      color: var(--gray-600);
      line-height: 1.5;
    }

    .ticket-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray-400);
    }

    .ticket-empty svg {
      margin-bottom: 12px;
      opacity: .4;
    }

    .ticket-empty p {
      font-size: .9rem;
    }

    .btn-submit-ticket {
      align-self: flex-start;
      padding: 10px 28px;
      background: var(--blue-600);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: .9rem;
      cursor: pointer;
      transition: background var(--transition);
    }

    .btn-submit-ticket:hover {
      background: var(--blue-700);
    }

    .toast-support {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
    }
  </style>
</head>

<body>

  <div class="main-wrapper">
    <header class="topbar" role="banner">
      <div class="topbar-brand">
        <span class="topbar-logo" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="9" fill="#2563EB" />
            <path d="M8 16C8 11.582 11.582 8 16 8s8 3.582 8 8-3.582 8-8 8" stroke="#fff" stroke-width="2.5" stroke-linecap="round" />
            <circle cx="16" cy="16" r="3" fill="#fff" />
          </svg>
        </span>
        <span class="topbar-name">ISMO<span class="topbar-name-accent">-SkillSwap</span></span>
      </div>

      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </span>
        <input type="search" id="search-input" class="search-input" placeholder="Rechercher un ticket..."
          aria-label="Rechercher" />
      </div>

      <div class="topbar-right">
        <a href="login.html" class="topbar-btn-login" style="padding: 8px 16px;">Connexion</a>
      </div>
    </header>

    <main class="content-area legal-page" id="main-content">
      <section class="content-main" style="max-width: 800px; margin: 0 auto;">
        <div class="legal-card support-layout">
          <h1>Support technique</h1>
          <p>Un probleme ? Creer un ticket et notre equipe vous repondra sous 24h.</p>

          <div class="support-tabs" role="tablist">
            <button class="support-tab active" data-panel="list" role="tab" aria-selected="true">Mes tickets</button>
            <button class="support-tab" data-panel="create" role="tab" aria-selected="false">Nouveau ticket</button>
          </div>

          <div class="support-panel active" id="panel-list" role="tabpanel">
            <div class="ticket-list" id="ticket-list">
              <div class="ticket-empty">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                <p>Aucun ticket pour le moment.</p>
              </div>
            </div>
          </div>

          <div class="support-panel" id="panel-create" role="tabpanel">
            <form class="ticket-form" id="ticket-form">
              <div class="form-group">
                <label for="ticket-subject">Sujet</label>
                <input type="text" id="ticket-subject" placeholder="Ex: Probleme de connexion" required />
              </div>
              <div class="form-group">
                <label for="ticket-category">Categorie</label>
                <select id="ticket-category">
                  <option value="account">Compte</option>
                  <option value="technical">Probleme technique</option>
                  <option value="billing">Facturation</option>
                  <option value="report">Signaler</option>
                  <option value="other">Autre</option>
                </select>
              </div>
              <div class="form-group">
                <label for="ticket-description">Description</label>
                <textarea id="ticket-description" placeholder="Decrivez votre probleme en details..." required></textarea>
              </div>
              <button type="submit" class="btn-submit-ticket">Envoyer</button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast-support" id="toast-support" aria-live="polite" aria-atomic="true"></div>

  <script src="../assets/js/dashboard.js"></script>
  <script>
    'use strict';

    const STORAGE_KEY = 'ismo_support_tickets';

    /* ── tabs ── */
    document.querySelectorAll('.support-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.support-tab').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-selected', 'false');
        });
        document.querySelectorAll('.support-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');
        document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
      });
    });

    /* ── helpers ── */
    function toast(msg) {
      const el = document.getElementById('toast-support');
      const t = document.createElement('div');
      t.className = 'toast toast-success';
      t.setAttribute('role', 'status');
      t.innerHTML = '<span>' + msg + '</span>';
      el.appendChild(t);
      setTimeout(() => {
        t.classList.add('toast-exit');
        t.addEventListener('animationend', () => t.remove(), { once: true });
      }, 3000);
    }

    function getTickets() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
    }

    function saveTickets(tickets) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tickets));
    }

    function renderTickets() {
      const list = document.getElementById('ticket-list');
      const tickets = getTickets();
      if (!tickets.length) {
        list.innerHTML =
          '<div class="ticket-empty">' +
          '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
          '<p>Aucun ticket pour le moment.</p></div>';
        return;
      }
      list.innerHTML = tickets.map(t => renderTicket(t)).join('');
    }

    function renderTicket(t) {
      const statusLabels = { open: 'Ouvert', in_progress: 'En cours', waiting: 'En attente', resolved: 'Resolu', closed: 'Ferme' };
      const catLabels = { account: 'Compte', technical: 'Technique', billing: 'Facturation', report: 'Signalement', other: 'Autre' };
      const repliesHtml = (t.replies || []).map(r =>
        '<div class="ticket-reply' + (r.staff ? ' staff' : '') + '">' +
        '<div class="ticket-reply-avatar">' + (r.staff ? 'S' : 'U') + '</div>' +
        '<div class="ticket-reply-body">' +
        '<div class="ticket-reply-header">' +
        '<span class="ticket-reply-author">' + (r.staff ? 'Support ISMO' : 'Vous') + '</span>' +
        '<span class="ticket-reply-time">' + new Date(r.date).toLocaleDateString('fr-FR') + '</span>' +
        '</div>' +
        '<div class="ticket-reply-text">' + r.text + '</div>' +
        '</div></div>'
      ).join('');

      return '<div class="ticket-card" data-id="' + t.id + '">' +
        '<div class="ticket-card-header">' +
        '<span class="ticket-card-subject">' + t.subject + '</span>' +
        '<div class="ticket-card-meta">' +
        '<span class="ticket-category">' + (catLabels[t.category] || t.category) + '</span>' +
        '<span class="ticket-status ' + t.status + '">' + (statusLabels[t.status] || t.status) + '</span>' +
        '<span class="ticket-date">' + new Date(t.date).toLocaleDateString('fr-FR') + '</span>' +
        '</div></div>' +
        '<div class="ticket-card-expand">' +
        '<div class="ticket-description">' + t.description + '</div>' +
        repliesHtml +
        '</div></div>';
    }

    /* ── create ticket ── */
    document.getElementById('ticket-form').addEventListener('submit', e => {
      e.preventDefault();
      const subject = document.getElementById('ticket-subject').value.trim();
      const category = document.getElementById('ticket-category').value;
      const description = document.getElementById('ticket-description').value.trim();
      if (!subject || !description) return;

      const tickets = getTickets();
      tickets.unshift({
        id: Date.now(),
        subject,
        category,
        description,
        status: 'open',
        date: new Date().toISOString(),
        replies: []
      });
      saveTickets(tickets);
      renderTickets();

      document.getElementById('ticket-subject').value = '';
      document.getElementById('ticket-description').value = '';
      document.querySelector('[data-panel="list"]').click();
      toast('Ticket envoye ! Notre equipe vous repondra sous 24h.');
    });

    /* ── expand ticket ── */
    document.getElementById('ticket-list').addEventListener('click', e => {
      const card = e.target.closest('.ticket-card');
      if (card) {
        card.classList.toggle('expanded');
      }
    });

    /* ── init ── */
    document.addEventListener('DOMContentLoaded', () => {
      renderTickets();
    });
  </script>
</body>

</html>
